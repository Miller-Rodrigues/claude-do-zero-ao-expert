<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso Cowork — Claude do Zero ao Expert</title>
  <meta name="description" content="Trilha completa para dominar o Claude Cowork: agentes, colaboração e automações.">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header id="site-header"></header>
  <main class="container course-layout">
    <aside id="course-sidebar"></aside>
    <section id="course-content"></section>
  </main>
  <footer id="site-footer" class="site-footer"></footer>

  <script type="module">
    import { initLayout } from './assets/js/layout.js';
    import { initCourseViewer } from './assets/js/course-viewer.js';
    import { coworkModules } from './assets/data/cowork-modules.js';

    initLayout();
    initCourseViewer(coworkModules, {
      sidebarEl: document.getElementById('course-sidebar'),
      contentEl: document.getElementById('course-content'),
    });
  </script>
</body>
</html>
